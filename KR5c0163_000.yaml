front:
  text: 太上通靈八史聖文真形圖競四
  hash: sha256:7aa2a2d648626dc9838dcdebb30f107321e9c44f6d865a78b3ebad947d35ddfe
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0163_HFL_000-001a, image: hfl/0534/0534-114.png}
body:
  text: 皇天史罡宇臨罡高天史罡字建罡天帝史罡字天罡上帝史罡字日源第一史夫臨罡妻字柱下巳午未日在人家赤衣分幘白筆進賢冠第二史夫建罡妻字玄精申酉戍日在人家白衣分幘白筆進賢冠第三史夫天罡妻字月精亥子丑日在人家黑衣分幘白筆進賢冠第四史夫日源妻字太玄寅卯辰日在人家青衣分幘白筆進賢冠此八史名以此日下人家若以占甲當呼其字問之即令人知消息若女問事呼妻名字此諸史上下直九日及三日復上周而復始凡事八史皆愛口不得罵詈毀辱八史皆不驚喚若三年以上皆可求請若有疾病欲命盡時亦可使行請命必得矣昔帝曰國之欲興修知此文人之欲冨招致此神能致此神財物如雲所向尅平安保子孫諸欲事八史安魂定魄能求此神頭髮不白得壽長清身潔澤欲求内學斯文可措故記八史之象若有逆召可念八史吉凶遠近之事史皆知之以語人若不能事者但家有此文令人意昭如日月也凡欲聦眀者當作逢占致八史已致之後可知隂宻之事預知未然之意審察萬里委曲之旨適可知吉凶不能却災矣凡君子内發小事之爲致財也使八史戒百日以其日召之不須跪若不得語且可心知也八史像當自隨之若有䘮辱可封著器中他室中有汚辱神則不下矣又説齋潔百日後始召八史時各以其史下日呼史字於室中左樞内果子一盤酒一盃呪曰曽孫某好樂道術今願八史之道謹奉甘果美酒當以祭之若致八史法各以其日下酒果等祭之二史一祭於堂户間以小蓆衣户樞為坐以盤盛棗栗二盤酒二盃著坐前道士面向户樞如祭之不幷也言曰曽孫某甲愛好道術謹齋潔上供甘果棗珍饌美酒芳香奉請皇天八史臨罡柱下願大飮大食醉飽爲度使某甲通神明達所占先知隂密之事須知未然之意察萬里之驗委曲之旨與其為交俱行俱止從今日爲始然後必有音響光影之應勿恠也至後史下日復祭之如前法此法各當呼其名史字皆一祭之有應驗之徴復經年歴歳䟽問不應者復祭之耳此八卦皇天帝神符以梧桐木板廣三寸長九寸朱塗上墨書符知戒百置之如方面其神即來下令人冨貴消官事消口舌冝錢財滅禍除怪冝酌酒祭其神所以知驗八史通靈符黄帝曰玄洞八卦神符上帝秘於華蓋太微斗宿中先師仰看畫之以為玄洞威靈神精演道符持以入胡以吾為此圖婆羅門因造變化術數萬來還中原以吾為道君知玄洞與天同功也神之眀察也威神驗也使精之信也演道之德以受小兆敢常佩之因藏於華蓋重秘之如賢人道士名巳入宿者得此通靈符文仙也君子以明達神為使令愚人得之心開得位坐致冨貴秘如華蓋李君同昇也黄帝曰華蓋玄洞通靈演道乾符字昊成位西北方二宿治北斗太微華蓋帝座下臨罡之种主也清潔上士名巳入宿以小紙書佩之神附躬令人通仲靈百病消除坐在立亡出入無間三年之後白日昇天星中朱書白素附以兆身八史事人役使萬端百病自愈生見天下未來之事愚士不正慎勿佩此但秘之藏之舉家無患明達冨貴髙官自至黄帝曰華蓋玄洞通靈演道坤符字闇冲柱史之神主也位西南二宿治北斗太微華蓋座下用如乾法黄帝曰華蓋玄洞通靈演道震符玄舉建罡之神主也治東方二宿屬北斗第一星用如前法黄帝曰華蓋玄洞通靈演道巽符字明一玄精之神主也治東南二宿屬北斗第二星用如此前法昔帝曰華蓋玄洞通靈演道坎符字仁王天罡之神主也治北方屬北斗第三星法如乾黄帝曰華蓋玄洞靈寳演道離符字明上月精之神主也治南方屬北斗第四星法如乾黄帝曰華蓋玄洞靈寳演道艮符字過意日原之神主也治東方二宿屬北斗第五星用如乾法黄帝曰華蓋玄洞通靈演道兊符字見陽太玄之仲主也治西方二宿屬北斗第六星如乾法用黄帝曰天地各歸其原乾坤合德治在斗中五帝為主太微為君衆卦布度二十八宿永受本氣運由機關還治各屬一星之符制令八精所憑臨罡柱下須此乃行子孫修之得為真人秘而藏之千金勿傳黄帝曰子能修道當先修身安魂定魄慎勿妄言潔齋百日沐浴華泉先祠八神近於堂樞次用八符史輙來憑俱行俱止為人使令八節佩符通達皇星髪白更黑齒落更生隨史乗龍出幽入㝠禳災却害變化示子所如法一非反逆子勿行之天宿責人黄帝曰凡人求占陽日子以符著左肘隂日丑以符著右肘存真人念史以著符手指八史即語子來人事隂宻委曲節次八史即皆知以語子當論以凡占慎言史知之真人上斗中神怒後不為人使也若問者有病官之事應禳災命子如法便還斗中參之有命福德者合為救之先令主某處求師藥及物急徃便得史輙應口前徃處持物候人或令置得之也史法為神氣病人見物便差若物所令驚出史或作驚驚之若山林明暗上中覆蓋之下不知何物呼史問之即巳知語子也黃帝曰子行此道當愛惜言語不得妄言吉祥民有凶惡衰禍怪異之事史隨子口便發以求兆爲人作凶異今百姓懼怖慎勿附符念史所有責怒史又為人作害災刑恣意所開志意洞逹前知未然昭如日月魍魎邪惡凶讒敢發辟兵冝官財钱冨貴爲之不難此道要秘黄帝曰子有光恩當得星符下能行修當盛以五綵袋懸在卧帳中若有賢明知欲修之如上法盛絳袋在子衣中今當五藏以絳宫真人子丹主之神常來與子丹為友若禳災却害諸所事皆更著符如下法當帶符之時以除淨時醮祭符以焼香棗果參茯苓湯置席前以黄絹帛爲淨道弄拜祝曰曾孫臣某甲言今日清明良日吉時冝醮八卦通天神八眀謹奉粟棗甘羙芳香謁請八君九君神皇伏羲枕中太乙雄供乾皇天君父師道明太上行符真人八君臨照曾孫賢者輔身八史天官今日開陽大化受符納真開通以降自然𠎝惡不當請問來事吉兆告以未來推行仁義福延無窮長享吉利受占未央黄帝曰既祭之子未知皇天覩其直子當以夜半時北向呪曰吾行天地足躡文昌心託太清和氣成形二十八宿逕造皇庭若知旨訣八精最真合光天神八史所憑八卦天君伏羲天皇須得星符神乃得行服之益知便見未然先祠八神次用八符天地合香前知未兆却知已殃上旬沐浴齋潔蘭香願除死籍更著長生與史為友俱朝皇星身託日月叅同四龍長受吉利萬壽無疆黄帝曰子決天地大事為人求命當以符著頭上盡存其字意命史甲乗青龍還斗中叅知天地某甲家吉凶史即上入斗宿下語人天地災否及人命有吉凶之事應禳便令史救之請命得壽無不驗黄帝曰子欲禳災却害轉禍為福當先念八史字今日昊成當使臨罡為某甲家禳災應須得某物原真人刹剛馳行疾反即隨口所召無不得也以禍為福莫殺人亦勿偏有所命使人狂走來愛己也若冝有所責命當解置符而命史暮卧有房室之事亦然令婦人不知恥也黄帝曰若婦人有好道者當令奉神用亦如法史圖曰男子奉其夫女子奉其妻夫妻共奉之若乾坤之順天行也故二人同心其利斷金共修之善其利甚深乃可乗青龍與神同遊天下也秘之秘之勿令不節三女惡行始婦爲之不能修此反誤子爾但勤為之道成之後神知子真人天自使以青腰玉女黄帝曰先師李君坐寂淨之庭著太微帝位斗宿中見此八符文以授小兆吾以小兆未知逆順即叩頭宿下祭如冩八史即來憑八史八卦精神八卦之符也能制八史不為人家作害也人家皆有八史在堂樞前更直斗中上曰斗君道人事須得星符能制不道惡犯違也受符修之神乃行史星符禁重不得轉傳自非賢人君子兆慎之千金勿傳傳必得賢非賢致殃若有其人當以吾祭皆法祭符斗下不祭如受斗君不知令人史神驚既不為使上啓斗君責人並受其殃祭作五帝座四座長二丈法繒為席座座三案嚴浄香燈棗湯七五果七中史貟座一案香燈各一五果三青栗棗一盤符置中央貟座上五盤果五香火請五帝斗神二十八宿太上老君伏羲神皇次呼八卦字行符真人某甲好道比來求請今當受其星符傳付賢明五彩爲座隨色鮮明湯茶時果隨事精嚴剋勵丹誠雖不掛念於斗下祭之勿與多人神不下臨祭畢送付賢者拜而受之真便附也先齋如法及可付也祭符及斗下並不得口請令聲大但心念請之爾太上通靈八史聖文真形圖
